apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-service
  labels:
    {{- include "sre-app.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: {{ .Values.app.port }}
      protocol: TCP
  selector:
    {{- include "sre-app.selectorLabels" . | nindent 4 }}
    