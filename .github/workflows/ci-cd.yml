name: CI/CD Pipeline com Segurança

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Executar testes
        run: |
          cd tests
          pytest -v test_app.py

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t sre-app:${{ github.sha }} app/

      - name: Scan com Trivy (vulnerabilidades)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sre-app:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Scan do Dockerfile (misconfigurações)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'app/'
          format: 'table'

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Helm
        uses: azure/setup-helm@v3

      - name: Lint do Helm Chart
        run: helm lint helm-chart/sre-app/