# Configurações da aplicação
app:
  name: sre-api
  tag: "latest"
  pullPolicy: IfNotPresent
  replicas: 2
  port: 8080

  resources:
   requests:
    cpu: "250m"
    memory: "256Mi"
   limits:
    cpu: "500m"
    memory: "512Mi"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 50

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 5

# Configurações do banco de dados
database:
  host: "sre-app-mysql"
  name: "sre_nivel2"
  user: "app"

# Configurações do MySQL (dependency)
mysql:
  image:
    registry: docker.io
    repository: bitnami/mysql
    tag: 8.0.36

mysql:  
  auth:
    rootPassword: "rootpass123"
    database: "sre_nivel2"
    username: "app"
    password: "secret"
  primary:
    persistence:
      size: 1Gi

# Backup
backup:
  enabled: true
  schedule: "0 2 * * *"
  retentionDays: 7